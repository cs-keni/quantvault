[mypy]
python_version = 3.12
mypy_path = .
plugins = pydantic.mypy

strict = true
warn_unused_ignores = true
warn_return_any = true
disallow_untyped_decorators = false

[mypy-yfinance.*]
ignore_missing_imports = true

[mypy-passlib.*]
ignore_missing_imports = true

[mypy-celery.*]
ignore_missing_imports = true

[mypy-tests.*]
disallow_untyped_defs = false
